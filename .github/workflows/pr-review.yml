name: pr-review

# Headless code-review agent (vivi) — now DELEGATES to the shared olympus
# mechanism (Netis/olympus). The review bot's identity, the auto-agent label,
# the default branch, and the build command all live in this repo's
# `.olympus.json`; the reviewer code + reusable workflow live in olympus,
# pinned to a tag. Upgrading the mechanism = bumping the @ref below (and
# `olympus_ref`) in lockstep.
#
# heron dogfooding the framework it spun out: olympus's review.yml was
# extracted FROM this repo's in-tree scripts/pr-review/* + scripts/agent-bot/
# {auto_merge,revise_dispatch}.sh, which have since been removed
# now that this delegation is proven (same staged approach as
# issue-triage.yml / issue-implement.yml).
#
# The reusable workflow carries the same gating that used to live here: fires
# after `ci` succeeds on a same-repo PR, reviews the diff, posts a structured
# review, then for auto-agent PRs either admin-merges (APPROVE + allowlisted
# author) or dispatches the pr-revise workflow (CHANGES_REQUESTED). Manual
# re-review via workflow_dispatch is preserved (needs olympus ≥ v0.2.0, which
# added the pr_number input).

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: read

jobs:
  review:
    uses: Netis/olympus/.github/workflows/review.yml@v0.4.0
    with:
      olympus_ref: v0.4.0
      runner_labels: '["self-hosted","heron"]'
      # Empty on the workflow_run path (resolved from the run event); the PR
      # number typed on a manual workflow_dispatch re-review.
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit          # LITELLM_* + AGENT_GH_TOKEN + AUTO_MERGE_TEAM
