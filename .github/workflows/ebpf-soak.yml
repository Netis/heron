name: ebpf-soak

# Quality-infra: after a staging deploy succeeds, prove heron's on-host eBPF
# SSL-uprobe capture works END TO END on the staging VM before prod is ever
# allowed to deploy it. Generates LLM-shaped TLS traffic on the VM and asserts
# the ebpf_* pipeline metrics moved AND a process-attributed LlmCall was
# synthesized, parsed, and persisted (see scripts/staging/ebpf-soak.sh).
#
# Chains after deploy-staging, in parallel with staging-soak:
#   ci(main) -> deploy-staging -> { staging-soak, ebpf-soak }
# Prod promotion (deploy-prod.yml / release.yml) requires BOTH the
# `staging-soaked` AND the `ebpf-soaked` commit statuses to be green.
#
# Runs ONLY on the dedicated `staging-deploy` self-hosted runner and ONLY for a
# successful deploy-staging run, so no untrusted/PR code reaches the host.
#
# Host-specific values come from repo Variables, never committed source:
#   gh variable set HERON_STAGE_VM   --body <domain>
#   gh variable set HERON_STAGE_USER --body <login>
on:
  workflow_run:
    workflows: [deploy-staging]
    types: [completed]
  # Manual lever: soak the eBPF path on whatever is currently deployed.
  workflow_dispatch: {}

concurrency:
  group: ebpf-soak
  cancel-in-progress: false

jobs:
  soak:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, staging-deploy]
    timeout-minutes: 15
    # statuses:write lets the final step stamp an `ebpf-soaked` commit status —
    # the authoritative "eBPF capture is green on staging" signal the prod gate
    # checks alongside `staging-soaked`.
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: soak the deployed staging binary's eBPF capture path
        id: soak
        env:
          HERON_STAGE_VM: ${{ vars.HERON_STAGE_VM }}
          HERON_STAGE_USER: ${{ vars.HERON_STAGE_USER }}
        run: bash scripts/staging/ebpf-soak.sh

      # Authoritative go/no-go signal for the prod-approval gate. Only the
      # workflow_run path carries the exact deployed commit; a skipped chain
      # (CI not green) never reaches this job, so a commit with NO `ebpf-soaked`
      # status simply hasn't been eBPF-soaked — don't promote it.
      - name: Stamp `ebpf-soaked` commit status
        if: ${{ always() && github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          OUTCOME: ${{ steps.soak.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$OUTCOME" = "success" ]; then
            state="success"; desc="eBPF capture soak passed — safe to promote to prod"
          else
            state="failure"; desc="eBPF capture soak ${OUTCOME} — do NOT promote"
          fi
          # Stamp via the REST API with curl, NOT `gh`: the staging-deploy runner
          # has curl but no `gh` CLI (the same trap staging-soak.yml documents).
          # A stamp failure must never fail the soak, so warn-and-continue.
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -d "{\"state\":\"${state}\",\"context\":\"ebpf-soaked\",\"description\":\"${desc}\",\"target_url\":\"${RUN_URL}\"}" \
            || echo "000")
          if [ "$code" = "201" ]; then
            echo "stamped ebpf-soaked=${state} on ${SHA}"
          else
            echo "::warning::failed to stamp ebpf-soaked status (HTTP ${code}); the soak result itself stands"
          fi
          {
            echo "### ebpf-soak → \`ebpf-soaked\` = **${state}**"
            echo ""
            echo "- commit: \`${SHA}\`"
            echo "- $desc"
            echo ""
            echo "Promote to prod only when this commit shows BOTH \`staging-soaked\` ✅ and \`ebpf-soaked\` ✅."
          } >> "$GITHUB_STEP_SUMMARY"
