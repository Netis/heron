name: staging-soak

# Quality-infra L7: after a staging deploy succeeds, replay a known pcap
# corpus through the freshly-deployed heron binary (tara) and assert
# parse/pairing/turn/persistence invariants. Catches the regression class
# that compiles + passes unit tests but mangles real wire traffic
# (the PR#47 validator-bypass / PR#48 storage-poisoning families).
#
# Chains after deploy-staging: ci(main) -> deploy-staging -> staging-soak.
# Runs ONLY on the dedicated `staging-deploy` self-hosted runner and ONLY for
# a successful deploy-staging run, so no untrusted/PR code reaches the host.
#
# Host-specific values come from repo Variables, never committed source:
#   gh variable set HERON_STAGE_VM   --body <domain>
#   gh variable set HERON_STAGE_USER --body <login>
on:
  workflow_run:
    workflows: [deploy-staging]
    types: [completed]
  # Manual lever: soak whatever is currently deployed on the VM, on demand.
  workflow_dispatch: {}

concurrency:
  group: staging-soak
  cancel-in-progress: false

jobs:
  soak:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, staging-deploy]
    timeout-minutes: 15
    # statuses:write lets the final step stamp a `staging-soaked` commit
    # status — the single authoritative "staging is green, safe to promote"
    # signal an approver checks before approving the prod deployment.
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: tara soak the deployed staging binary
        id: soak
        env:
          HERON_STAGE_VM: ${{ vars.HERON_STAGE_VM }}
          HERON_STAGE_USER: ${{ vars.HERON_STAGE_USER }}
          # Make the sustained-load soak a real pre-prod GATE: a load regression
          # now fails the deploy (was informational). Safe because tara's
          # dual-binary baseline reports a too-tight-threshold environment as
          # `harness_broken` (non-blocking) — only a candidate that regresses
          # against the rolling known-good blocks. Operators can set the repo
          # Variable HERON_STAGE_LOAD_ENFORCE=0 to fall back to informational.
          HERON_STAGE_LOAD_ENFORCE: ${{ vars.HERON_STAGE_LOAD_ENFORCE || '1' }}
        run: bash scripts/staging/soak-staging.sh

      # Authoritative go/no-go signal for the prod-approval gate. Only the
      # workflow_run path carries the exact deployed commit; a skipped chain
      # (CI not green) never reaches this job, so a commit with NO
      # `staging-soaked` status simply hasn't been soaked — don't promote it.
      - name: Stamp `staging-soaked` commit status
        if: ${{ always() && github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          OUTCOME: ${{ steps.soak.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$OUTCOME" = "success" ]; then
            state="success"; desc="tara soak passed — safe to promote to prod"
          else
            state="failure"; desc="tara soak ${OUTCOME} — do NOT promote"
          fi
          # Stamp via the REST API with curl, NOT `gh`: the staging-deploy runner
          # has curl but no `gh` CLI, so the original `gh api` exited 127 and
          # failed the whole soak workflow — which dropped workflow_run.conclusion
          # to "failure" and blocked deploy-prod even though the soak PASSED.
          # A stamp failure must never fail the soak, so warn-and-continue.
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -d "{\"state\":\"${state}\",\"context\":\"staging-soaked\",\"description\":\"${desc}\",\"target_url\":\"${RUN_URL}\"}" \
            || echo "000")
          if [ "$code" = "201" ]; then
            echo "stamped staging-soaked=${state} on ${SHA}"
          else
            echo "::warning::failed to stamp staging-soaked status (HTTP ${code}); the soak result itself stands"
          fi
          {
            echo "### staging-soak → \`staging-soaked\` = **${state}**"
            echo ""
            echo "- commit: \`${SHA}\`"
            echo "- $desc"
            echo ""
            echo "Promote to prod only when this commit shows \`staging-soaked\` ✅."
          } >> "$GITHUB_STEP_SUMMARY"
