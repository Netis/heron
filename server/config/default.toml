# TokenScope default configuration

# ---------------------------------------------------------------------------
# Pipelines
#
# Each [[pipeline]] is an independent processing pipeline with its own worker
# pool. Sources nested under a pipeline share its workers. Multiple pipelines
# provide resource isolation (e.g., separate shard counts for local capture
# vs. cloud-probe ingestion).
#
# CLI flags (--pcap-file, -i) OVERRIDE all config pipelines: when present,
# a single "cli" pipeline with default parameters is used.
# ---------------------------------------------------------------------------
# [[pipeline]]
# name = "local"
# dispatcher_count = 1
# flow_shard_count = 4
#
# [pipeline.turn]
# idle_timeout_secs = 600
# sweep_interval_secs = 10
# grace_ms = 1000          # buffer-finalize fan-in jitter window (see docs/design/04b)
# shard_count = 1
#
# [pipeline.metrics]
# shard_count = 1
#
# [[pipeline.sources]]
# type = "pcap"
# interface = "eth0"
# bpf_filter = "tcp port 8080"
# snaplen = 262144
#
# [[pipeline.sources]]
# type = "cloud-probe"
# endpoint = "tcp://0.0.0.0:5555"
# recv_hwm = 1000
#
# [[pipeline.sources]]
# type = "pcap-file"
# path = "/data/captures/llm-traffic.pcap"
# realtime = false
#
# # Optional: persist captured packets to Wireshark-openable pcap files, one
# # per source_id (interface name for pcap/pcap-file, probe UUID for
# # cloud-probe). Off by default — enable only when you need offline replay
# # or traffic capture for support.
# #
# # `dir` is resolved relative to the working directory. When TokenScope is
# # started by systemd or via install.sh layout, the CWD is not the install
# # tree, so use an absolute path (e.g. /var/lib/tokenscope/dumps) to keep
# # dumps next to the DuckDB file.
# #
# # Layout: <dir>/<pipeline_name>/<sanitized_source_id>/<minute>.pcap[.snappy]
# # The pipeline-name layer is appended automatically — multiple pipelines
# # sharing `dir` stay fully isolated on disk, with each pipeline's
# # retention task scoped to its own subtree.
# #
# # Files rotate on wall-clock minute (by packet timestamp). Empty minutes
# # are skipped. compression="snappy" appends .snappy and writes via the
# # snap framed format (decompress with `snzip -d` before opening in Wireshark).
# [pipeline.pcap_dump]
# enabled = false
# dir = "data/dumps"
# compression = "none"   # "none" | "snappy"
#
# # File retention. Both rules are on by default — when pcap_dump is enabled,
# # the sweeper deletes files older than `max_age_hours` and, if total usage
# # exceeds `max_size_mb`, evicts oldest minute files until under the cap.
# # The current and previous wall-clock minutes are always preserved (race
# # protection vs. the active writer). Set `enabled = false` to skip
# # retention entirely; set a rule to `0` to disable just that rule.
# [pipeline.pcap_dump.retention]
# enabled = true
# check_interval_secs = 3600
# max_age_hours = 24      # 0 = never expire by age.
# max_size_mb = 10240     # 10 GiB (10 * 1024 MiB) total cap per pipeline dir.
#                         # 0 = no size cap.

# Bounded channel capacities between pipeline stages. All default to 4096.
# Override per-pipeline under [[pipeline]].
# [pipeline.queues]
# raw = 4096
# parsed_packet = 4096
# flow_event = 4096
# turn_event = 4096
# metrics_event = 4096
# call_sink = 4096
# turn_sink = 4096
# metric_sink = 4096

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
[storage]
backend = "duckdb"

[storage.duckdb]
path = "data/tokenscope.duckdb"

# Storage sink batching. flush_interval_ms is the upper bound on how long a
# single LlmCall / AgentTurn / metric row can sit in the in-memory buffer
# before being committed to DuckDB. 200 ms keeps the worst-case "captured
# → visible" latency under ~250 ms while costing < 3 % extra wall-clock vs.
# 1000 ms (each flush is ~5 ms; producer typically interval-bound).
[storage.sink]
batch_size = 1000
flush_interval_ms = 200

# Data retention (enabled by default with sane TTLs — values below are the
# active defaults, shown for reference). Set `enabled = false` to opt out, or
# set any field to `0` to make that table never expire.
#
# Constraint: `turns` must not outlive `calls` (validate enforces
# `turns <= calls`, with `calls = 0` treated as infinite). Surviving turns
# whose llm_calls have been pruned would render as empty/partial in the
# detail view, since `agent_turns.call_ids` references rows in `llm_calls`.
# [storage.retention]
# enabled = true
# check_interval_secs = 3600
# calls = 30             # LLM call detail (request/response bodies); caps `turns`
# turns = 30             # Agent turn summaries; must be <= calls (or set calls = 0)
# http_exchanges = 7     # Raw HTTP transport records (headers + bodies) — bulkiest table
#
# Per-granularity retention for llm_metrics. Missing keys fall back to the
# defaults below — overriding one label does NOT drop the others. Set a key
# to 0 to disable retention for that granularity.
# [storage.retention.metrics]
# "10s" = 1
# "1m"  = 7
# "5m"  = 30
# "1h"  = 365

# ---------------------------------------------------------------------------
# Internal metrics (pipeline self-monitoring)
# ---------------------------------------------------------------------------
[internal_metrics]
enabled = true
interval_secs = 10

# ---------------------------------------------------------------------------
# API server
# ---------------------------------------------------------------------------
[api]
listen = "0.0.0.0"
port = 3000
