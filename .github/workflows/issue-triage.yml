name: issue-triage

# Triage now DELEGATES to the shared olympus mechanism (Netis/olympus).
# This repo's triage policy — gates, labels, reply language, agent names —
# lives in `.olympus.json`; the agent code + reusable workflow live in
# olympus, pinned to a tag. Upgrading the mechanism = bumping the @ref below
# (and `olympus_ref`) in lockstep.
#
# This is heron dogfooding the framework it spun out: olympus was extracted
# FROM heron's in-tree scripts/agent-bot/run_triage.sh, which has since been
# removed now that this delegation is proven in production.
#
# The reusable workflow carries the same opened/agent:assess gating, the
# mara/incident + already-queued guards, and the warm-reply behavior that used
# to live here.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    uses: Netis/olympus/.github/workflows/triage.yml@v0.4.0
    with:
      olympus_ref: v0.4.0
      runner_labels: '["self-hosted","heron"]'
    secrets: inherit          # LITELLM_BASE_URL / API_KEY / NO_PROXY + AGENT_GH_TOKEN
