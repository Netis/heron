name: ci

# Runs on the dedicated CI runner pool (label `ci-pool`) — a self-hosted
# runner with the toolchain (rustup stable + bun + Node) pre-installed.
# Kept separate from the agent runner pool (`heron`) so heavy CI compiles
# run on dedicated capacity and no longer queue behind — or block — the
# AI agent jobs (triage / wiwi / pr-review). Network egress works out of
# the box on the pool host.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Fork-PR safety gate. This job runs on a self-hosted runner, so it must
    # never execute code from a forked pull request: a fork author could run
    # arbitrary commands on the runner (and pivot from it) via build.rs,
    # proc-macros, #[test] bodies, package lifecycle scripts, or the checked-out
    # lint scripts. Restrict the pull_request trigger to same-repo branches;
    # push/main runs are unaffected. Fork PRs intentionally get no CI here —
    # review them from a trusted branch or on an ephemeral hosted runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, ci-pool]
    # 25 was fine for test+lint, but the on-main artifact build adds a full
    # release compile (cargo build --release --features console) + the console
    # bundle, which pushed main-push runs past 25m and got them auto-cancelled
    # (so the staging deploy never fired). 60 covers a cold release build.
    timeout-minutes: 60
    env:
      # actions/checkout@v4 ships Node 20; GitHub is deprecating
      # Node 20 on runners. Opt JS actions into Node 24 so each run
      # doesn't annotate with the deprecation warning.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the git-LFS pcap corpus (testdata/pcaps/corpus/*.pcap) so the
          # corpus_golden regression tests run instead of skipping. Needs
          # git-lfs on the runner; if a fixture stays an unsmudged pointer the
          # harness skips it rather than parsing the pointer as a pcap.
          lfs: true

      - name: Toolchain versions
        run: |
          cargo --version
          rustc --version
          cargo clippy --version
          bun --version
          python3 --version

      - name: lint — referenced secrets are provisioned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/lint/check-secrets.sh

      - name: lint — secret values are sane (not '-', not empty)
        # Catches the `gh secret set X --body -` stdin-bug class: a
        # secret silently persisted as the literal string "-" passes
        # `check-secrets.sh` (it's "provisioned") but blows up at
        # runtime with masked log noise. We pull each known secret
        # into env and let the script validate length / shape.
        # Secret VALUES are never printed; only lengths surface in
        # CI logs.
        env:
          AGENT_GH_TOKEN:   ${{ secrets.AGENT_GH_TOKEN }}
          LITELLM_API_KEY:  ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_NO_PROXY: ${{ secrets.LITELLM_NO_PROXY }}
        run: |
          bash scripts/lint/check-secret-values.sh \
            AGENT_GH_TOKEN LITELLM_API_KEY LITELLM_BASE_URL LITELLM_NO_PROXY

      - name: lint — validated constructors are scoped
        run: python3 scripts/lint/check-validated-constructors.py

      # NOTE: the generic internal-infra LEAKAGE gate now runs in the separate
      # guard.yml workflow (delegated to agent-ops guard.yml@v0.2.0). The in-tree
      # scripts/lint/check-leakage.sh is retained only for the pcap-corpus gate +
      # the self-test below; heron-specific lints stay here.

      - name: lint — pcap corpus (manifest consistency + binary leakage)
        # check-leakage.sh skips binary files, so committed corpus pcaps are
        # NOT scanned there — this is the secret gate for the binary corpus,
        # plus manifest↔file↔golden consistency.
        run: bash scripts/lint/check-pcap-corpus.sh

      - name: lint — leakage linter self-test
        # Guards the leakage gate itself: a regression in check-leakage.sh
        # (broken regex, mis-scoped allowlist) would otherwise silently
        # weaken the gate without failing any build. Runs hermetically in
        # a throwaway git repo, so it never touches the working tree.
        run: bash scripts/lint/test-check-leakage.sh

      - name: cargo test
        working-directory: server
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --workspace --quiet

      - name: cargo test (fault-injection feature)
        # Builds h-storage-duckdb with the `fault-injection` feature and
        # runs its concurrent_tests module, which contains the
        # deterministic recovery tests that drive the PR#48-class
        # "FATAL → reopen → every surface works" path. The feature is
        # off by default in `cargo test --workspace` above so production
        # builds and the headline test run see no extra code; this step
        # exists to keep the recovery-path tests green.
        working-directory: server
        env:
          CARGO_TERM_COLOR: always
        run: cargo test -p h-storage-duckdb --features fault-injection --quiet

      - name: cargo test (schema-migration golden DBs)
        # Locks in the auto-migration code in h-storage-duckdb/src/schema.rs
        # against silent regression. Tests synthesize the on-disk shape
        # of older releases via DDL, run current init(), and assert the
        # expected drift (columns added/dropped, legacy values rewritten).
        working-directory: server
        env:
          CARGO_TERM_COLOR: always
        run: cargo test -p h-storage-duckdb --test migrations --quiet

      - name: compile hot-path benches (perf-bench bitrot gate)
        # The criterion benches in h-protocol/benches/ measure the per-packet
        # hot paths (decode, reassembly+parse, shard-hash). Building them in CI
        # keeps them runnable as the public API evolves — an API change that
        # breaks a bench is caught here, at the PR, not when someone next runs
        # `cargo bench`. We compile only (`--no-run`): criterion's timings are
        # too noisy on shared self-hosted runners to gate on, so the
        # run-and-compare-to-baseline (enforcing) tier is a deliberate follow-up.
        working-directory: server
        env:
          CARGO_TERM_COLOR: always
        run: cargo bench -p h-protocol --no-run

      - name: cargo clippy (informational; not enforcing yet)
        working-directory: server
        # Clippy enforcement deferred — main has accumulated lint debt
        # that needs a focused cleanup pass before -D warnings can land.
        # For now: report lints, don't fail the build. Tracking cleanup
        # separately; flip back to `-- -D warnings` once main is clean.
        continue-on-error: true
        run: cargo clippy --workspace --all-targets

      - name: bun install
        working-directory: console
        run: bun install --frozen-lockfile

      - name: bun test
        working-directory: console
        run: bun test

      - name: tara soak invariant-checker tests
        # Guards the staging-soak judgement logic (scripts/staging/tara_invariants.py).
        # Dependency-free (stdlib only) so it needs no pip install on the runner.
        run: python3 scripts/staging/tests/test_tara_invariants.py

      - name: longevity-soak checker tests
        # Guards the nightly endurance judgement logic
        # (scripts/staging/longevity_check.py). Stdlib-only.
        run: python3 scripts/staging/tests/test_longevity_check.py

      - name: distributed-soak checker tests
        # Guards the distributed-capture soak judgement logic
        # (scripts/staging/distributed_invariants.py — many probes → one central).
        # Stdlib-only; reuses tara_invariants' load invariants.
        run: python3 scripts/staging/tests/test_distributed_invariants.py

      # NOTE: the agent-bot tests (triage reply composition + mara debounce)
      # moved to agent-ops with the agent loop; they run in agent-ops's own CI
      # against the canonical scripts/agent-bot/* now that heron delegates those
      # surfaces. heron no longer carries the in-tree scripts or their tests.

      # --- staging artifact ---------------------------------------------
      # On a push to main (post-merge), build the deployable binary and
      # publish it so deploy-staging.yml can roll it onto the heron-stage VM.
      # MUST build the console bundle first AND pass `--features console`,
      # else the embedded UI is empty (a bare cargo build serves a blank
      # page — see docs/install.md "Building from source").
      - name: build console bundle (staging artifact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: console
        run: bun run build

      # The staging build ships the `ebpf` feature so the staging VM can validate
      # on-host SSL-uprobe capture before prod is allowed to deploy (see the
      # ebpf-soak gate). That out-of-band BPF program build (h-capture/build.rs →
      # h-ebpf-prog) needs a nightly toolchain with rust-src (for `-Z build-std`)
      # and bpf-linker. Idempotent on the self-hosted runner: nightly install is
      # a fast no-op when present; bpf-linker is guarded so it compiles only once.
      - name: provision eBPF build toolchain (staging artifact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rustup toolchain install nightly --component rust-src --profile minimal
          if ! command -v bpf-linker >/dev/null 2>&1; then
            echo "bpf-linker not found; installing…"
            cargo install bpf-linker --locked
          else
            echo "bpf-linker already present: $(command -v bpf-linker)"
          fi

      - name: build heron release binary with console + ebpf (staging artifact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: server
        run: cargo build --release --bin heron --features "console ebpf"

      - name: build heron-probe with ebpf (distributed-capture edge agent)
        # Verifies the probe's eBPF compile path (the Linux-only EbpfSource
        # redactor wiring + the heron-probe binary) using the toolchain just
        # provisioned above. Post-merge only, like the heron staging build —
        # the BPF toolchain is too heavy to provision on every PR. The probe is
        # packaged/deployed via deploy/probe/ (its own image), so this is a
        # compile gate, not an uploaded artifact.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: server
        run: cargo build --release --bin heron-probe --features ebpf

      - name: upload heron staging artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: heron-staging
          path: server/target/release/heron
          retention-days: 7
          if-no-files-found: error
