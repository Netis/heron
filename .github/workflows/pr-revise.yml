name: pr-revise

# wiwi REVISION pass — now DELEGATES to the shared olympus mechanism
# (Netis/olympus). Dispatched by the review workflow's revise_dispatch step
# (`gh workflow run pr-revise.yml -f pr_number=N`) when vivi REQUEST_CHANGES a
# wiwi PR (label `auto-agent`) and the round cap isn't hit. The workflow NAME
# must stay `pr-revise.yml` because revise_dispatch targets it by filename.
#
# It checks out the PR head, runs olympus's run_revise.sh to address the
# blocking feedback, and pushes back — which re-triggers ci → pr-review, so
# vivi re-reviews. The round cap lives in revise_dispatch.sh (olympus side).
#
# Dispatch-only: the trigger is a PAT-authenticated `gh workflow run` (a review
# posted by GITHUB_TOKEN can't start a workflow run — GitHub anti-recursion).
#
# In-tree scripts/agent-bot/run_revise.sh has since been removed now that
# this delegation is proven (same staged approach as the other surfaces).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to revise
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  revise:
    uses: Netis/olympus/.github/workflows/revise.yml@v0.4.0
    with:
      pr_number: ${{ inputs.pr_number }}
      olympus_ref: v0.4.0
      runner_labels: '["self-hosted","heron"]'
    secrets: inherit          # LITELLM_* + AGENT_GH_TOKEN
